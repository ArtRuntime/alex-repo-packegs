name: alex-repo-auto-update

on:
  schedule:
    - cron: "0 3 * * *"      # 9 AM IST
    - cron: "0 */9 * * *"    # every 9 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-updates:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.check.outputs.matrix }}
      has_updates: ${{ steps.check.outputs.has_updates }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install requests bs4 jq

      - name: Fetch previous state
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download latest -p "versions.json" || echo "{}" > versions.json

      - name: Check for updates
        id: check
        run: |
          matrix_array="[]"
          UPDATE_FOUND=false
          
          for pkg_dir in */ ; do
            if [ -f "${pkg_dir}main.py" ] && [ -f "${pkg_dir}PKGBUILD.template" ]; then
              pkg_name=$(basename "$pkg_dir")
              cd "$pkg_dir"
              
              echo "Checking $pkg_name..."
              if [ -f requirements.txt ]; then pip install -r requirements.txt > /dev/null 2>&1; fi
              
              NEW_JSON=$(python main.py)
              NEW_VERSION=$(echo "$NEW_JSON" | jq -r '.version')
              NEW_SHA256=$(echo "$NEW_JSON" | jq -r '.sha256')
              NEW_URL=$(echo "$NEW_JSON" | jq -r '.url')
              
              OLD_VERSION=$(cat ../versions.json | jq -r ".[\"$pkg_name\"] // \"0.0.0\"")
              
              if [ "$OLD_VERSION" != "$NEW_VERSION" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
                echo " -> Needs update! ($OLD_VERSION -> $NEW_VERSION)"
                UPDATE_FOUND=true
                
                pkg_json=$(jq -n \
                  --arg name "$pkg_name" \
                  --arg version "$NEW_VERSION" \
                  --arg sha256 "$NEW_SHA256" \
                  --arg url "$NEW_URL" \
                  '{name: $name, version: $version, sha256: $sha256, url: $url}')
                  
                matrix_array=$(echo "$matrix_array" | jq ". + [$pkg_json]")
              else
                echo " -> Up to date ($OLD_VERSION)"
              fi
              cd ..
            fi
          done
          
          # Pass the JSON array of packages to the matrix job
          echo "matrix=$(echo "$matrix_array" | jq -c .)" >> $GITHUB_OUTPUT
          echo "has_updates=$UPDATE_FOUND" >> $GITHUB_OUTPUT

  build-package:
    needs: check-updates
    if: needs.check-updates.outputs.has_updates == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # If one package fails, keep building the others!
      matrix:
        package: ${{ fromJson(needs.check-updates.outputs.matrix) }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Template PKGBUILD
        run: |
          cd ${{ matrix.package.name }}
          escaped_url=$(echo "${{ matrix.package.url }}" | sed 's/[&/\]/\\&/g')
          sed "s/{VERSION}/${{ matrix.package.version }}/g; s/{SHA256}/${{ matrix.package.sha256 }}/g; s|{URL}|${{ matrix.package.url }}|g" PKGBUILD.template > PKGBUILD

      - name: Build Package in Sandbox
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace/${{ matrix.package.name }} \
            archlinux:latest \
            bash -c "
              pacman -Syu --noconfirm base-devel sudo git
              useradd -m builder
              echo 'builder ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers
              chown -R builder .
              su builder -c 'makepkg -sf --noconfirm'
            "

      - name: Upload Package Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pkg-${{ matrix.package.name }}
          path: ${{ matrix.package.name }}/*.pkg.tar.zst
          retention-days: 1

  publish:
    needs: [check-updates, build-package]
    if: needs.check-updates.outputs.has_updates == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download all package artifacts
        uses: actions/download-artifact@v4
        with:
          path: new_packages
          pattern: pkg-*
          merge-multiple: true

      - name: Fetch previous DB and versions.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download latest -p "versions.json" || echo "{}" > versions.json
          gh release download latest -p "alex-repo.db.tar.gz" || true

      - name: Update versions.json state
        run: |
          echo '${{ needs.check-updates.outputs.matrix }}' > matrix.json
          jq -c '.[]' matrix.json | while read -r item; do
            name=$(echo "$item" | jq -r '.name')
            version=$(echo "$item" | jq -r '.version')
            jq ".[\"$name\"] = \"$version\"" versions.json > versions.tmp && mv versions.tmp versions.json
          done

      - name: Update Master Database
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            archlinux:latest \
            bash -c "
              pacman -Syu --noconfirm base-devel
              mv new_packages/*.pkg.tar.zst .
              repo-add alex-repo.db.tar.gz *.pkg.tar.zst
            "

      - name: Import GPG
        if: env.GPG_PRIVATE_KEY != ''
        uses: crazy-max/ghaction-import-gpg@v7
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          trust_level: 5

      - name: Sign Packages and Prepare Release
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          sudo chown -R $USER:$USER .
          
          if [ -n "$GPG_PRIVATE_KEY" ]; then
            for pkg in *.pkg.tar.zst; do
              gpg --batch --detach-sign --yes --no-armor "$pkg"
            done
            gpg --batch --detach-sign --yes --no-armor alex-repo.db.tar.gz
            gpg --batch --detach-sign --yes --no-armor alex-repo.files.tar.gz
          fi
          
          rm -f alex-repo.db alex-repo.db.sig alex-repo.files alex-repo.files.sig
          cp alex-repo.db.tar.gz alex-repo.db
          [ -f alex-repo.db.tar.gz.sig ] && cp alex-repo.db.tar.gz.sig alex-repo.db.sig || true
          cp alex-repo.files.tar.gz alex-repo.files
          [ -f alex-repo.files.tar.gz.sig ] && cp alex-repo.files.tar.gz.sig alex-repo.files.sig || true
          
          find . -name "*.sig" -size 0 -delete
          
          # Persist file sizes in versions.json as a fallback
          if ! jq -e '.assets' versions.json > /dev/null 2>&1; then
            jq '.assets = {}' versions.json > versions.tmp && mv versions.tmp versions.json
          fi
          
          for file in *.pkg.tar.zst *.pkg.tar.zst.sig alex-repo.db* alex-repo.files*; do
            if [ -f "$file" ]; then
              size=$(stat -c%s "$file")
              jq ".assets[\"$file\"] = $size" versions.json > versions.tmp && mv versions.tmp versions.json
            fi
          done
          
          echo "Automated rolling release for alex-repo packages." > release_notes.md
          echo "Latest updates included in this run." >> release_notes.md

      - name: Publish Rolling Release
        uses: softprops/action-gh-release@v2.5.0
        with:
          tag_name: latest
          name: Arch Linux Rolling Repository
          body_path: release_notes.md
          files: |
            *.pkg.tar.zst
            *.pkg.tar.zst.sig
            alex-repo.db*
            alex-repo.files*
            versions.json
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger Mirror Dashboard Sync
        env:
          SYNC_API_KEY: ${{ secrets.SYNC_API_KEY }}
          SYNC_URL: ${{ secrets.SYNC_URL }}
        run: |
          if [ -n "$SYNC_API_KEY" ] && [ -n "$SYNC_URL" ]; then
            curl -X POST "$SYNC_URL" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $SYNC_API_KEY" \
              -d "{}"
          fi